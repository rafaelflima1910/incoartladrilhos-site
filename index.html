<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Teste HTML Simples</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 20px;
            background-color: #f4f4f4;
            color: #333;
        }
        .container {
            max-width: 800px;
            margin: 0 auto;
            background: white;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }
        h1 {
            color: #2c3e50;
            text-align: center;
        }
        p {
            line-height: 1.6;
        }
        button {
            padding: 12px 25px;
            font-size: 16px;
            background-color: #3498db;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            margin-top: 20px;
        }
        button:hover {
            background-color: #2980b9;
        }
        .resultado {
            margin-top: 20px;
            padding: 15px;
            background-color: #ecf0f1;
            border-radius: 5px;
            min-height: 50px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>✅ Teste HTML Simples</h1>
        
        <p>Este é um arquivo HTML básico criado para testes. Ele inclui:</p>
        <ul>
            <li>Estrutura completa (DOCTYPE, head, body)</li>
            <li>Meta tags responsivas</li>
            <li>CSS embutido com estilo moderno</li>
            <li>Interatividade com JavaScript</li>
        </ul>

        <button onclick="testar()">Clique aqui para testar</button>

        <div class="resultado" id="resultado">
            Clique no botão acima para ver a mensagem...
        </div>
    </div>

    <script>
        function testar() {
            const resultado = document.getElementById('resultado');
            resultado.innerHTML = `
                <strong>🎉 Teste realizado com sucesso!</strong><br>
                Data e hora atual: ${new Date().toLocaleString('pt-BR')}
            `;
            resultado.style.backgroundColor = '#d5f4e6';
        }
    </script>
</body>
</html>
